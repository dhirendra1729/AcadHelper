name: doc_scanner_frontend
description: A new Flutter project for document scanning and summarization.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  file_picker: ^8.1.5
  google_mlkit_text_recognition: ^0.13.0
  google_generative_ai: ^0.4.0
  flutter_dotenv: ^5.1.0
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0
  firebase_auth: ^5.0.0
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/
    - .env
